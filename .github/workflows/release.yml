name: Generate Theme Zip

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Clean Folder
        run: |
          mkdir aegis-child
          # Copy everything to the new folder, excluding hidden files like .git
          rsync -av --exclude='aegis-child' --exclude='.git' --exclude='.github' . aegis-child/

      - name: Create Zip File
        run: zip -r aegis-child.zip aegis-child

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: aegis-child.zip